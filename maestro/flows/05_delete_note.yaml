appId: com.atomczak.notepat
env:
  F02_NOTE_TITLE: ${F02_NOTE_TITLE || "Note Beta"}
---
- stopApp
- launchApp
- runFlow: ../subflows/dismiss_common_interruptions.yaml
- extendedWaitUntil:
    visible:
      id: new_note_fab
    timeout: 5000
- longPressOn:
    text: ${F02_NOTE_TITLE}
- tapOn:
    text: "More options"
    optional: true
- tapOn:
    text: "Delete"
- extendedWaitUntil:
    visible: "Delete the selected notes?"
    timeout: 5000
- tapOn: "OK"
- extendedWaitUntil:
    visible:
      id: new_note_fab
    timeout: 5000
- assertNotVisible: ${F02_NOTE_TITLE}
- tapOn:
    text: "Open navigation drawer"
- tapOn:
    text: "Trash"
- assertVisible: ${F02_NOTE_TITLE}
