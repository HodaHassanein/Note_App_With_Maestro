appId: com.atomczak.notepat
env:
  F07_EXPORT_MARKER: ${F07_EXPORT_MARKER || "export body"}
---
- stopApp
- launchApp
- runFlow: ../subflows/dismiss_common_interruptions.yaml
- extendedWaitUntil:
    visible:
      id: new_note_fab
    timeout: 5000
- tapOn:
    id: new_note_fab
- extendedWaitUntil:
    visible:
      id: action_save_note
    timeout: 5000
- tapOn:
    id: textNoteTitleEdit
- inputText: "Export note"
- tapOn:
    id: textNoteContentEdit
- inputText: ${F07_EXPORT_MARKER}
- hideKeyboard
- tapOn:
    id: action_save_note
- pressKey: Back
- extendedWaitUntil:
    visible:
      id: new_note_fab
    timeout: 5000
- longPressOn:
    text: "Export note"
- tapOn: "More options"
- tapOn: "Export notes to text files"
- tapOn:
    text: "SAVE"
    optional: true
- pressKey: Back

