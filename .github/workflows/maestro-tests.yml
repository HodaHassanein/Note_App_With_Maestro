name: Maestro Tests

# push on master, any PR, daily at 6:00 AM Cairo (UTC+3 = 03:00 UTC)
on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  maestro:
    name: Run Maestro flows on Android emulator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64-${{ runner.os }}

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          emulator-boot-timeout: 300
          script: echo "AVD created"

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          emulator-boot-timeout: 300
          script: |
            set -e
            adb install -r "$GITHUB_WORKSPACE/maestro/app/notepad-free.apk"

            OUTPUT_XML="$GITHUB_WORKSPACE/maestro-results.xml"
            FLOWS_DIR="$GITHUB_WORKSPACE/maestro/flows"

            set +e
            $HOME/.maestro/bin/maestro test \
              -e F01_NOTE_TITLE="Note Alpha" \
              -e F01_NOTE_BODY="body alpha" \
              -e F02_NOTE_TITLE="Note Beta" \
              -e F02_UNDO_FULL="Hello World" \
              -e F03_NEW_TITLE="Note Gamma" \
              -e F03_NEW_BODY="body gamma" \
              -e F06_COLOR_SWATCH="48%,52%" \
              -e F07_EXPORT_MARKER="export body" \
              --format junit \
              --output "$OUTPUT_XML" \
              "$FLOWS_DIR"
            MAESTRO_EXIT=$?
            set -e

            if [ $MAESTRO_EXIT -eq 0 ]; then
              echo "MAESTRO_STATUS=passed" >> $GITHUB_ENV
              STATUS="passed"
            else
              echo "MAESTRO_STATUS=failed" >> $GITHUB_ENV
              STATUS="failed"
            fi

            PASSED=$(grep -c '<testcase' "$OUTPUT_XML" 2>/dev/null || echo 0)
            FAILED=$(grep -c '<failure' "$OUTPUT_XML" 2>/dev/null || echo 0)

            mkdir -p "$GITHUB_WORKSPACE/reports/latest"
            cat > "$GITHUB_WORKSPACE/reports/latest/report.txt" << REPORT
            Last Maestro run (CI)
            =====================
            Time    : $(date '+%Y-%m-%d %H:%M:%S UTC')
            Branch  : $GITHUB_REF_NAME
            Trigger : $GITHUB_EVENT_NAME
            Commit  : $GITHUB_SHA
            Status  : $STATUS
            Total   : $PASSED  Failed: $FAILED
            Run     : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
            REPORT

            if [ -d "$HOME/.maestro/tests" ]; then
              cp -r "$HOME/.maestro/tests" "$GITHUB_WORKSPACE/reports/latest/maestro-artifacts" || true
            fi

      - name: Upload report and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: |
            ${{ github.workspace }}/reports/latest/
            ${{ github.workspace }}/maestro-results.xml
          retention-days: 7

      - name: Notify - PASSED
        if: always() && env.MAESTRO_STATUS == 'passed'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          to:             ${{ secrets.MAIL_TO }}
          from:           Maestro CI <${{ secrets.MAIL_USERNAME }}>
          subject:        "Maestro PASSED - ${{ github.ref_name }} (${{ github.event_name }})"
          body: |
            All Maestro flows passed.

            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Report  : Download "maestro-report" artifact from the Run link above.

      - name: Notify - FAILED
        if: always() && env.MAESTRO_STATUS == 'failed'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          to:             ${{ secrets.MAIL_TO }}
          from:           Maestro CI <${{ secrets.MAIL_USERNAME }}>
          subject:        "Maestro FAILED - ${{ github.ref_name }} (${{ github.event_name }})"
          body: |
            One or more Maestro flows FAILED.

            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Open the Run link -> download "maestro-report" artifact:
            - report.txt       : simple pass/fail summary
            - maestro-results.xml : full JUnit results
            - maestro-artifacts/  : screenshots for failed flows
