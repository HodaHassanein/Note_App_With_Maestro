name: Maestro Cloud Tests

# Triggers: every push on main, every PR on any branch, daily at 6:00 AM Cairo (UTC+3 = 03:00 UTC)
on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    - cron: '0 4 * * *'

jobs:
  maestro-cloud:
    name: Run Maestro flows on Maestro Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload APK and run flows on Maestro Cloud
        id: maestro
        uses: mobile-dev-inc/action-maestro-cloud@v2.0.2
        with:
          api-key:    ${{ secrets.MAESTRO_API_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          # TODO: put your APK under maestro/app/ and update this path
          app-file:   maestro/app/notepad-free.apk
          workspace:  maestro/flows
          name:       "${{ github.event_name }} - ${{ github.ref_name }} - ${{ github.sha }}"
          timeout:    30
          env: |
            F01_NOTE_TITLE=Note Alpha
            F01_NOTE_BODY=body alpha
            F02_NOTE_TITLE=Note Beta
            F02_UNDO_FULL=Hello World
            F03_NEW_TITLE=Note Gamma
            F03_NEW_BODY=body gamma
            F06_COLOR_SWATCH=48%,52%
            F07_EXPORT_MARKER=export body

      - name: Notify - PASSED
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          to:             ${{ secrets.MAIL_TO }}
          from:           Maestro CI <${{ secrets.MAIL_USERNAME }}>
          subject:        "Maestro PASSED - ${{ github.ref_name }} (${{ github.event_name }})"
          body: |
            All Maestro flows passed.

            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Cloud   : ${{ steps.maestro.outputs.MAESTRO_CLOUD_CONSOLE_URL }}

      - name: Notify - FAILED
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          to:             ${{ secrets.MAIL_TO }}
          from:           Maestro CI <${{ secrets.MAIL_USERNAME }}>
          subject:        "Maestro FAILED - ${{ github.ref_name }} (${{ github.event_name }})"
          body: |
            One or more Maestro flows FAILED.

            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Cloud   : ${{ steps.maestro.outputs.MAESTRO_CLOUD_CONSOLE_URL }}

            Open the links above to see which flows failed and the screenshots.
