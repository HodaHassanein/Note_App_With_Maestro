name: Maestro Tests

on:
  push:
    branches: [ master ]
  pull_request:
  # schedule:
  #   - cron: '0 4 * * *'

jobs:
  maestro:
    name: Run Maestro flows on Android emulator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64-${{ runner.os }}-${{ hashFiles('**/*.yml') }}

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -memory 2048
          disable-animations: true
          emulator-boot-timeout: 300
          script: echo "AVD created"

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -memory 2048
          disable-animations: true
          emulator-boot-timeout: 300
          script: bash $GITHUB_WORKSPACE/maestro/ci/run-tests.sh

      - name: Upload report and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: |
            ${{ github.workspace }}/reports/latest/
            ${{ github.workspace }}/maestro-results.xml
          retention-days: 7

      - name: Notify - PASSED
        if: always() && env.MAESTRO_STATUS == 'passed' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          to:             ${{ secrets.MAIL_TO }}
          from:           Maestro CI <${{ secrets.MAIL_USERNAME }}>
          subject:        "Maestro PASSED - ${{ github.ref_name }} (${{ github.event_name }})"
          body: |
            All Maestro flows passed.

            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Report  : Download "maestro-report" artifact from the Run link above.

      - name: Notify - FAILED
        if: always() && env.MAESTRO_STATUS == 'failed' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          to:             ${{ secrets.MAIL_TO }}
          from:           Maestro CI <${{ secrets.MAIL_USERNAME }}>
          subject:        "Maestro FAILED - ${{ github.ref_name }} (${{ github.event_name }})"
          body: |
            One or more Maestro flows FAILED.

            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}
            Commit  : ${{ github.sha }}
            Run     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Open the Run link -> download "maestro-report" artifact:
            - report.txt          : simple pass/fail summary
            - maestro-results.xml : full JUnit results
            - maestro-artifacts/  : screenshots for failed flows
